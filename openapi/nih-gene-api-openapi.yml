components:
  schemas:
    v2OrthologRequestContentType:
      type: string
      enum:
      - COMPLETE
      - IDS_ONLY
      default: COMPLETE
    v2GeneType:
      type: string
      enum:
      - UNKNOWN
      - tRNA
      - rRNA
      - snRNA
      - scRNA
      - snoRNA
      - PROTEIN_CODING
      - PSEUDO
      - TRANSPOSON
      - miscRNA
      - ncRNA
      - BIOLOGICAL_REGION
      - OTHER
      default: UNKNOWN
      title: 'NB: GeneType values match Entrez Gene'
    v2GeneDatasetReportsRequestSymbolsForTaxon:
      type: object
      properties:
        symbols:
          type: array
          items:
            type: string
        taxon:
          type: string
          title: NCBI Taxonomy ID or name (common or scientific, any taxonomic rank) for the provided gene symbol
    v2reportsWarning:
      type: object
      properties:
        gene_warning_code:
          $ref: '#/components/schemas/v2reportsWarningGeneWarningCode'
        reason:
          type: string
        message:
          type: string
        replaced_id:
          $ref: '#/components/schemas/v2reportsWarningReplacedId'
        unrecognized_identifier:
          type: string
    v2reportsErrorOrganelleErrorCode:
      type: string
      enum:
      - UNKNOWN_ORGANELLE_ERROR_CODE
      - INVALID_ORGANELLE_TAXON
      - NO_ORGANELLES_FOR_ACCESSION
      default: UNKNOWN_ORGANELLE_ERROR_CODE
    v2reportsGeneSummary:
      type: object
      properties:
        source:
          type: string
          title: Source of the gene summary
        description:
          type: string
          title: Gene summary text itself that describes the gene
        date:
          type: string
          title: Date that the gene summary was last updated
    v2GeneDatasetRequestGeneDatasetReportType:
      type: string
      enum:
      - DATASET_REPORT
      - PRODUCT_REPORT
      default: DATASET_REPORT
    v2GeneDatasetRequestContentType:
      type: string
      enum:
      - COMPLETE
      - IDS_ONLY
      default: COMPLETE
    v2SortField:
      type: object
      properties:
        field:
          type: string
        direction:
          $ref: '#/components/schemas/v2SortDirection'
    v2reportsGeneOntology:
      type: object
      properties:
        assigned_by:
          type: string
          title: The database that made the annotation
        molecular_functions:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsProcessMetadata'
        biological_processes:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsProcessMetadata'
        cellular_components:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsProcessMetadata'
    v2reportsErrorAssemblyErrorCode:
      type: string
      enum:
      - UNKNOWN_ASSEMBLY_ERROR_CODE
      - INVALID_BIOPROJECT_IDS
      - NO_ASSEMBLIES_FOR_BIOPROJECTS
      - INVALID_TAXON
      - MISSING_SEARCH_FIELD
      - INVALID_BIOSAMPLE_IDS
      - NO_ASSEMBLIES_FOR_BIOSAMPLE_IDS
      - NO_ASSEMBLIES_FOR_ASSEMBLY_NAMES
      - INVALID_WGS_ACCESSIONS
      - NO_ASSEMBLIES_FOR_WGS_ACCESSIONS
      default: UNKNOWN_ASSEMBLY_ERROR_CODE
    v2reportsOrientation:
      type: string
      enum:
      - none
      - plus
      - minus
      default: none
    v2DownloadSummaryAvailableFiles:
      type: object
      properties:
        all_genomic_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        genome_gff:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        genome_gbff:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        rna_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        prot_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        genome_gtf:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        cds_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        sequence_report:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        annotation_report:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
    v2reportsTranscriptTypeCount:
