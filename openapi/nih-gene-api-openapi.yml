      enum:
      - UNKNOWN
      - tRNA
      - rRNA
      - snRNA
      - scRNA
      - snoRNA
      - PROTEIN_CODING
      - PSEUDO
      - TRANSPOSON
      - miscRNA
      - ncRNA
      - BIOLOGICAL_REGION
      - OTHER
      default: UNKNOWN
      title: 'NB: GeneType values match Entrez Gene'
    v2DownloadSummaryHydrated:
      type: object
      properties:
        estimated_file_size_mb:
          type: integer
        url:
          type: string
        cli_download_command_line:
          type: string
    v2reportsGenomicRegionGenomicRegionType:
      type: string
      enum:
      - UNKNOWN
      - REFSEQ_GENE
      - PSEUDOGENE
      - BIOLOGICAL_REGION
      - OTHER
      default: UNKNOWN
    v2reportsNomenclatureAuthority:
      type: object
      properties:
        authority:
          type: string
          title: The nomenclature authority for this gene record
        identifier:
          type: string
          title: The nomenclature authority identifier for this gene record
    v2reportsMapLocationMapType:
      type: string
      enum:
      - Unknown
      - Cytogenetic
      - Genetic
      default: Unknown
    protobufAny:
      type: object
      properties:
        type_url:
          type: string
        value:
          type: string
          format: byte
    v2reportsMessage:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/v2reportsError'
        warning:
          $ref: '#/components/schemas/v2reportsWarning'
    v2reportsErrorGeneErrorCode:
      type: string
      enum:
      - UNKNOWN_GENE_ERROR_CODE
      - INCOMPLETE_LOOKUP_SYMBOL
      - INVALID_TAXON_GENE_ARGUMENT
      default: UNKNOWN_GENE_ERROR_CODE
    v2Fasta:
      type: string
      enum:
      - FASTA_UNSPECIFIED
      - FASTA_GENE
      - FASTA_RNA
      - FASTA_PROTEIN
      - FASTA_GENE_FLANK
      - FASTA_CDS
      - FASTA_5P_UTR
      - FASTA_3P_UTR
      default: FASTA_UNSPECIFIED
    v2reportsMapLocation:
      type: object
      properties:
        map_type:
          $ref: '#/components/schemas/v2reportsMapLocationMapType'
          title: Type of mapping; can be "Cytogenetic" or "Genetic"
        map_value:
          type: string
          title: Location of the gene in mapping coordinates
    v2reportsTranscriptSelectCategory:
      type: string
      enum:
      - SELECT_UNKNOWN
      - REFSEQ_SELECT
      - MANE_SELECT
      - MANE_PLUS_CLINICAL
      default: SELECT_UNKNOWN
    rpcStatus:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/protobufAny'
    v2reportsWarningGeneWarningCode:
      type: string
      enum:
      - UNKNOWN_GENE_WARNING_CODE
      - ACCESSION_VERSION_MISMATCH
      - REPLACED_GENE_ID
      - DISCONTINUED_GENE_ID
      - UNRECOGNIZED_GENE_ID
      - UNRECOGNIZED_GENE_SYMBOL
      - UNRECOGNIZED_ACCESSION
      - UNRECOGNIZED_TAX_TOKEN
      - NO_GENE_ANNOTATION_FOUND
      - ABOVE_SPECIES_TAXON
      default: UNKNOWN_GENE_WARNING_CODE
    v2reportsGeneDescriptor:
      type: object
      properties:
        gene_id:
          type: string
          format: uint64
          title: NCBI Gene ID
        symbol:
          type: string
          title: Gene symbol
        description:
          type: string
          title: Gene name
        tax_id:
          type: string
          format: uint64
          title: NCBI Taxonomy ID for the organism
        taxname:
          type: string
          title: Taxonomic name of the organism
        common_name:
          type: string
          title: Common name of the organism
        type:
          $ref: '#/components/schemas/v2reportsGeneType'
          title: Type of gene
        rna_type:
          $ref: '#/components/schemas/v2reportsRnaType'
        orientation:
          $ref: '#/components/schemas/v2reportsOrientation'
          title: Direction of the gene relative to the genome coordinates
        reference_standards:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsGenomicRegion'
        genomic_regions:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsGenomicRegion'
        chromosomes:
          type: array
          items:
            type: string
        nomenclature_authority:
          $ref: '#/components/schemas/v2reportsNomenclatureAuthority'
        swiss_prot_accessions:
          type: array
          items:
            type: string
        ensembl_gene_ids:
          type: array
          items:
            type: string
        omim_ids:
          type: array
          items:
            type: string
        synonyms:
          type: array
          items:
            type: string
        alternate_names:
          type: array
          items:
            type: string
        replaced_gene_id:
          type: string
          format: uint64
          title: The NCBI Gene ID for the gene that was merged into the current gene record
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsAnnotation'
        transcript_count:
          type: integer
          title: Number of transcripts encoded by the gene
        protein_count:
          type: integer
          title: Number of proteins encoded by the gene
        transcript_type_counts:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsTranscriptTypeCount'
        gene_groups:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsGeneGroup'
        summary:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsGeneSummary'
        gene_ontology:
          $ref: '#/components/schemas/v2reportsGeneOntology'
        locus_tag:
          type: string
        map_locations:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsMapLocation'
    v2GeneDatasetReportsRequest:
      type: object
      properties:
        returned_content:
          $ref: '#/components/schemas/v2GeneDatasetReportsRequestContentType'
          title: Return complete gene reports, or abbreviated reports with either GeneIDs only or GeneIDs, transcript and protein counts.
        gene_ids:
          type: array
          items:
            type: integer
        accessions:
          type: array
          items:
            type: string
        symbols_for_taxon:
          $ref: '#/components/schemas/v2GeneDatasetReportsRequestSymbolsForTaxon'
        taxon:
          type: string
          title: NCBI Taxonomy ID or name (common or scientific) that the genes are annotated at
        locus_tags:
          type: array
          items:
            type: string
        table_fields:
          type: array
          items:
            type: string
        table_format:
          type: string
          title: 'Specify a predefined set of fields for the tabular report using built-in templates. Use of this parameter requires the HTTP header, `accept: text/tab-separated-values`.'
        include_tabular_header:
          $ref: '#/components/schemas/v2IncludeTabularHeader'
          title: Specify when to include the table header when requesting a tabular report.
        page_size:
          type: integer
          title: The maximum number of gene reports to return. Default is 20 and maximum is 1000. If the number of results exceeds the page size, `page_token` can be used to retrieve the remaining results.
        page_token:
          type: string
          title: A page token is returned when the results count exceeds `page size`. Use this token along with previous request parameters to retrieve the next page of results. When `page_token` is empty, all results have been retrieved.
        query:
          type: string
          title: Limit to genes that match the specified gene symbol, name (description), alias, locus tag or protein name.
        types:
          type: array
          items:
            $ref: '#/components/schemas/v2GeneType'
        accession_filter:
          type: array
          items:
            type: string
        tax_search_subtree:
          type: boolean
          title: If true, include genes from taxonomic ranks below the requested taxon.
        sort:
          type: array
          items:
            $ref: '#/components/schemas/v2SortField'
    v2reportsMaturePeptide:
      type: object
      properties:
        accession_version:
          type: string
        name:
          type: string
        length:
          type: integer
    v2DownloadSummaryDehydrated:
      type: object
      properties:
        estimated_file_size_mb:
          type: integer
        url:
          type: string
        cli_download_command_line:
          type: string
        cli_rehydrate_command_line:
          type: string
