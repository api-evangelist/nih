components:
  schemas:
    v2reportsPairedAssembly:
      type: object
      properties:
        accession:
          type: string
          title: The GenColl assembly accession of the GenBank or RefSeq assembly paired with this one
        status:
          $ref: '#/components/schemas/v2reportsAssemblyStatus'
          title: GenColl Assembly status from paired record
        annotation_name:
          type: string
          title: Annotation name from paired record
        only_genbank:
          type: string
          title: Sequences that are only included in the GenBank assembly
        only_refseq:
          type: string
          title: Sequences that are only included in the RefSeq assembly
        changed:
          type: string
          title: Sequences present on both the GenBank and the RefSeq assemblies that have been changed, e.g., contaminated sequence in the GenBank assembly has been replaced with a gap
        manual_diff:
          type: string
          title: Manually curated description of differences between the GenBank and RefSeq assemblies
        refseq_genbank_are_different:
          type: boolean
          title: boolean indication on whether there are any differences between the GenBank and RefSeq assemblies
        differences:
          type: string
          title: Concatenation of all differences between the GenBank and RefSeq assemblies, including manually curated description and other fields
    v2reportsErrorOrganelleErrorCode:
      type: string
      enum:
      - UNKNOWN_ORGANELLE_ERROR_CODE
      - INVALID_ORGANELLE_TAXON
      - NO_ORGANELLES_FOR_ACCESSION
      default: UNKNOWN_ORGANELLE_ERROR_CODE
    v2DownloadSummaryAvailableFiles:
      type: object
      properties:
        all_genomic_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        genome_gff:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        genome_gbff:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        rna_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        prot_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        genome_gtf:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        cds_fasta:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        sequence_report:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
        annotation_report:
          $ref: '#/components/schemas/v2DownloadSummaryFileSummary'
    v2AssemblyDatasetDescriptorsFilter:
      type: object
      properties:
        reference_only:
          type: boolean
          title: If true, limit to reference genome assemblies.
        assembly_source:
          $ref: '#/components/schemas/v2AssemblyDatasetDescriptorsFilterAssemblySource'
          title: Limit to either RefSeq (GCF_) or GenBank (GCA_) genome assemblies.
        has_annotation:
          type: boolean
          title: Limit to annotated genome assemblies.
        exclude_paired_reports:
          type: boolean
          title: If true, for GenBank (GCA_)/RefSeq (GCF_) pairs, returns the RefSeq copy. When no RefSeq copy exists, the GenBank assembly is returned.
        exclude_atypical:
          type: boolean
          title: If true, exclude [atypical genome assemblies](https://www.ncbi.nlm.nih.gov/datasets/docs/v2/data-processing/policies-annotation/genome-processing/genome_notes/#atypical-assemblies), i.e., genomes that have assembly issues or are otherwise atypical.
        assembly_version:
          $ref: '#/components/schemas/v2AssemblyDatasetDescriptorsFilterAssemblyVersion'
          title: Limit to the most recent (current) version of a genome assembly.
        assembly_level:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsAssemblyLevel'
        first_release_date:
          type: string
          format: date-time
          title: Limit to genomes released on or after the specified date
        last_release_date:
          type: string
          format: date-time
          title: Limit to genomes released on or before the specified date
        search_text:
          type: array
          items:
            type: string
        is_metagenome_derived:
          $ref: '#/components/schemas/v2AssemblyDatasetDescriptorsFilterMetagenomeDerivedFilter'
          title: Exclude or limit to metagenome-assembled genomes (MAGs).
        is_type_material:
          type: boolean
          title: If true, limit to genomes derived from type material.
        is_ictv_exemplar:
          type: boolean
          title: If true, limit to genomes derived from an ICTV exemplar (only applies to virus genomes).
        exclude_multi_isolate:
          type: boolean
          title: If true, exclude genomes that were sequenced as part of large multi-isolate projects.
        type_material_category:
          $ref: '#/components/schemas/v2AssemblyDatasetDescriptorsFilterTypeMaterialCategory'
          title: Limit to genomes derived from specific type material categories.
    v2reportsBioSampleContact:
      type: object
      properties:
        lab:
          type: string
          title: Submitter lab name.
    v2reportsGenomicRegion:
      type: object
      properties:
        gene_range:
          $ref: '#/components/schemas/v2reportsSeqRangeSet'
          title: The range of this Gene record on this genomic region.
        type:
          $ref: '#/components/schemas/v2reportsGenomicRegionGenomicRegionType'
          title: Type of genomic region
    v2reportsSeqRangeSet:
      type: object
      properties:
        accession_version:
          type: string
          title: NCBI Accession.version of the sequence
        range:
          type: array
          items:
            $ref: '#/components/schemas/v2reportsRange'
    v2AssemblyCheckMHistogramRequest:
      type: object
      properties:
        species_taxon:
          type: string
          title: Bacterial species taxonomy ID or taxonomic name
    v2reportsGeneCounts:
      type: object
      properties:
        total:
          type: integer
          title: Total number of annotated genes
        protein_coding:
          type: integer
          title: Count of annotated genes that encode a protein
        non_coding:
          type: integer
